<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>単語管理 | word_practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header"><div class="brand">単語管理</div><div class="badge">/words</div></header>
    <nav class="nav">
      <a href="index.html">トップ</a><a class="active" href="words.html">単語管理</a><a href="practice.html">練習</a><a href="review.html">復習</a><a href="result.html">結果</a><a href="settings.html">設定</a>
    </nav>

    <section class="grid two">
      <article class="card">
        <h2>苦手単語一覧</h2>
        <table class="table">
          <thead><tr><th>漢字</th><th>ローマ字</th><th>誤答率</th><th>操作</th></tr></thead>
          <tbody>
            <tr><td>議事録</td><td>gijiroku</td><td>42%</td><td><button class="btn btn-secondary">編集</button></td></tr>
            <tr><td>要件定義</td><td>youkenteigi</td><td>35%</td><td><button class="btn btn-secondary">編集</button></td></tr>
            <tr><td>進捗管理</td><td>shinchokukanri</td><td>29%</td><td><button class="btn btn-secondary">編集</button></td></tr>
          </tbody>
        </table>
      </article>
      <article class="card">
        <h2>単語を追加</h2>
        <label class="label">漢字表示</label><input class="input" placeholder="例: 議事録">
        <label class="label" style="margin-top:10px;">判定用ローマ字</label><input class="input" placeholder="例: gijiroku">
        <label class="label" style="margin-top:10px;">メモ</label><input class="input" placeholder="使う場面など">
        <div class="controls"><button class="btn btn-primary">保存</button><button class="btn btn-danger">削除</button></div>
      </article>
    </section>
  </main>
</body>
</html>
