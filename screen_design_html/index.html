<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>練習セッション | word_practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header"><div class="brand">練習セッション（自動ミックス）</div><div class="badge">/</div></header>
    <nav class="nav">
      <a class="active" href="index.html">練習</a><a href="result.html">結果</a><a href="settings.html">設定</a>
    </nav>

    <section class="card">
      <div class="status-line"><span>Q 3 / 10</span><span id="timer">30s</span></div>
      <div class="progress"><div id="bar"></div></div>
      <h3>表示（漢字）</h3>
      <div id="problem" class="problem" data-romaji="gijiroku">議事録</div>
      <label class="label">入力（ローマ字）</label>
      <input id="answer-input" class="input" placeholder="gijiroku">
      <p id="judge-status" class="small" style="margin-top:8px;">入力中にリアルタイム判定します</p>
      <div class="controls">
        <button id="start-demo" class="btn btn-secondary">タイマー開始デモ</button>
      </div>
      <p class="small" style="margin-top:8px;">通常語と苦手語を自動で混ぜて出題。設定した職業に合わせてLLMが問題を生成・自動登録。出題配分も自動最適化。10秒: 先頭1文字ヒント / 20秒: 先頭2文字ヒント / 30秒: タイムアウト</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
