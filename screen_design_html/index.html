<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>練習セッション | word_practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header"><div class="brand">練習セッション（自動ミックス）</div><div class="badge">/</div></header>
    <nav class="nav">
      <a class="active" href="index.html">練習</a><a href="settings.html">設定</a>
    </nav>

    <section class="split-layout">
      <div class="main-pane">
        <section class="card">
          <div class="status-line"><span>Q 3 / 10</span><span id="timer">30s</span></div>
          <div class="progress"><div id="bar"></div></div>
          <h3>表示（漢字）</h3>
          <div id="problem" class="problem" data-romaji="gijiroku">議事録</div>
          <label class="label">入力（ローマ字）</label>
          <div id="answer-display" class="answer-display" aria-live="polite"></div>
          <p id="judge-status" class="small" style="margin-top:8px;"></p>
          <div class="controls">
            <button id="start-demo" class="btn btn-secondary">スタート</button>
          </div>
        </section>

        <section class="grid three" style="margin-top:14px;">
          <article class="card"><h3>正答率</h3><div class="metric">80%</div></article>
          <article class="card"><h3>平均回答時間</h3><div class="metric">6.2s</div></article>
          <article class="card"><h3>連続正解</h3><div class="metric">4</div></article>
        </section>

      </div>

      <aside class="side-pane">
        <article class="card weak-trend-side">
        <h2>苦手傾向</h2>
        <ul class="stack-list">
          <li><strong>議事録</strong><span>タイムアウト 2回</span></li>
          <li><strong>要件定義</strong><span>ローマ字ミス 1回</span></li>
          <li><strong>進捗管理</strong><span>回答遅延 1回</span></li>
        </ul>
        </article>
      </aside>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
