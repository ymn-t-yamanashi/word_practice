<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>画面設計 | word_practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">word_practice / 画面設計</div>
      <div class="badge">typing-first design</div>
    </header>

    <section class="hero">
      <h1>ローマ字入力 × 漢字表示</h1>
      <p>実装前の画面設計モックです。トップに「すぐ練習」を置き、到達直後にタイピング開始できる導線にしています。</p>
    </section>

    <nav class="nav" style="margin-top:16px;">
      <a class="active" href="index.html">トップ</a>
      <a href="words.html">単語管理</a>
      <a href="practice.html">練習</a>
      <a href="result.html">結果</a>
      <a href="settings.html">設定</a>
    </nav>

    <section class="card quick-start">
      <div class="quick-title">
        <h2>今すぐ練習を開始</h2>
        <span class="pill">最短 1クリック</span>
      </div>
      <p class="small" style="margin-top:6px;">表示は漢字、入力はローマ字。問題は通常語と苦手語を自動で混ぜて出題します。</p>
      <div class="quick-problem">議事録</div>
      <label class="label">ローマ字入力（開始前の入力例）</label>
      <input class="input" placeholder="gijiroku">
      <div class="quick-actions">
        <a class="btn btn-quick" href="practice.html">練習を開始する</a>
      </div>
    </section>
  </main>
</body>
</html>
