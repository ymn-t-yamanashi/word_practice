<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>画面設計 | word_practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">word_practice / 画面設計</div>
      <div class="badge">typing-first design</div>
    </header>

    <section class="hero">
      <h1>ローマ字入力 × 漢字表示</h1>
      <p>実装前の画面設計モックです。タイピング体験を主軸に、単語管理・復習・結果確認・設定までの導線を確認できます。</p>
    </section>

    <nav class="nav" style="margin-top:16px;">
      <a class="active" href="index.html">トップ</a>
      <a href="words.html">単語管理</a>
      <a href="practice.html">練習</a>
      <a href="review.html">復習</a>
      <a href="result.html">結果</a>
      <a href="settings.html">設定</a>
    </nav>

    <section class="grid three">
      <article class="card">
        <h2>単語管理</h2>
        <p class="small">苦手語の登録・編集。漢字主表記とローマ字判定値を保持。</p>
        <div class="controls"><a class="btn btn-primary" href="words.html">画面を開く</a></div>
      </article>
      <article class="card">
        <h2>練習 / 復習</h2>
        <p class="small">30秒制限、10秒/20秒ヒント。ローマ字入力で判定。</p>
        <div class="controls"><a class="btn btn-primary" href="practice.html">練習へ</a><a class="btn btn-secondary" href="review.html">復習へ</a></div>
      </article>
      <article class="card">
        <h2>結果</h2>
        <p class="small">正答率・平均回答時間・連続正解と推奨単語を確認。</p>
        <div class="controls"><a class="btn btn-primary" href="result.html">結果を見る</a></div>
      </article>
    </section>
  </main>
</body>
</html>
