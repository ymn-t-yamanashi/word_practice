<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>出題設定 | word_practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header"><div class="brand">出題設定（自動ミックス）</div><div class="badge">/review</div></header>
    <nav class="nav">
      <a href="index.html">練習</a><a href="result.html">結果</a><a href="settings.html">設定</a>
    </nav>

    <section class="grid two">
      <article class="card">
        <h2>自動ミックス候補</h2>
        <table class="table">
          <thead><tr><th>単語</th><th>優先度</th><th>目安</th></tr></thead>
          <tbody>
            <tr><td>進捗管理</td><td>高</td><td>早め</td></tr>
            <tr><td>要件定義</td><td>中</td><td>通常</td></tr>
            <tr><td>議事録</td><td>高</td><td>早め</td></tr>
          </tbody>
        </table>
      </article>
      <article class="card">
        <h2>セッション設定</h2>
        <label class="label">出題数</label><input class="input" value="10">
        <label class="label" style="margin-top:10px;">配分</label><input class="input" value="通常語 70% / 苦手語 30%">
        <div class="controls"><button class="btn btn-primary">この設定で開始</button></div>
      </article>
    </section>
  </main>
</body>
</html>
